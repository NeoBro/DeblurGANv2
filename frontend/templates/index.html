<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeblurGANv2 Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Image Restoration</p>
      <h1>DeblurGANv2 Studio</h1>
      <p class="sub">Drop a blurry image, run inference, compare before and after instantly.</p>
    </header>

    <section class="panel controls">
      <form id="upload-form">
        <label class="file-drop" for="image-input">
          <input id="image-input" name="image" type="file" accept="image/*" required />
          <span class="drop-title">Choose Image</span>
          <span class="drop-sub">PNG, JPG, WEBP</span>
        </label>

        <label class="field">
          <span>Weights Path</span>
          <input id="weights-path" name="weights_path" type="text" value="fpn_inception.h5" />
        </label>

        <button id="run-btn" type="submit">Deblur Image</button>
      </form>
      <p id="status" class="status">Idle</p>
    </section>

    <section class="panel compare" id="compare-panel" hidden>
      <div class="compare-frame" id="compare-frame">
        <img id="img-after" alt="Deblurred output" />
        <div class="before-wrap" id="before-wrap">
          <img id="img-before" alt="Original input" />
        </div>
        <input id="slider" class="slider" type="range" min="0" max="100" value="50" />
      </div>
      <a id="download-link" class="download" download="deblurred.png">Download Output</a>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
